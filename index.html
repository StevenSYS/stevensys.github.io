<!DOCTYPE html>
<html lang="en">
	<head>
		<title>StevenSYS - Homepage</title>
		<link rel="icon" type="image/png" href="/Images/favicon.png">
		<link rel="apple-touch-icon" sizes="192x192" href="/Images/faviconat.png">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
		<link rel="stylesheet" href="/style.css">
	</head>
	<body>
		<div class="center">
			<img src="/Images/Logo2x.png" alt="StevenSYS Logo">
			<p>
				<a href="/jsonpage/">JSONpage</a>
				- Create simple websites using a JSON file.
			</p>
			<p>
				<a href="/what">What do we do at StevenSYS?</a>
			</p>
			<p class="small">Copyright &#169; StevenSYS <script>if (new Date().getFullYear() > 2023) {document.write("2023-");} document.write(new Date().getFullYear());</script></p>
		</div>

		<div class="moveable">
			<img src="/Images/Objects/SYSDLL.png" alt="SYSDLL" class="sysdll" style="display: none;" draggable="false">
			<img src="/Images/Objects/Pumpkin.png" alt="Pumpkin" class="pumpkin" style="display: none;" draggable="false">
			<img src="/Images/Objects/pumkan't.png" alt="pumkan't" class="pumkant" style="display: none;" draggable="false">
			<img src="/Images/Objects/ChristmasTree.png" alt="Christmas Tree" class="tree" style="display: none;" draggable="false">
			<img src="/Images/Objects/ChristmasPresent.png" alt="Christmas Present" class="present" style="display: none;" draggable="false">
			<img src="/Images/Objects/SantaHat.png" alt="Santa Hat" class="santahat" style="display: none;" draggable="false">
			<img src="/Images/Objects/CandyCane.png" alt="Candy Cane" class="candycane" style="display: none;" draggable="false">
		</div>

		<div class="contextmenu">
			<div class="ctext">
				<a href="javascript:void(0)" onmousedown="window.open(rcHref);">Open Link in New Tab</a>
				<hr>
			</div>
			<div class="image">
				<a href="javascript:void(0)" onmousedown="window.open(rcSrc);">Open Image in New Tab</a>
				<hr>
			</div>
			<div class="text">
				<a href="javascript:void(0)" onmousedown="execCommand('copy');">Copy</a>
				<hr>
			</div>
			<a href="javascript:void(0)" onmousedown="history.back();">Backwards</a>
			<a href="javascript:void(0)" onmousedown="history.forward();">Forwards</a>
			<a href="javascript:void(0)" onmousedown="location.reload();">Reload</a>
			<hr>
			<a href="javascript:void(0)" onmousedown="execCommand('selectall');">Select All</a>
			<hr>
			<a class="hover darkmode" href="javascript:void(0)" onmousedown="darkmode();"></a>
			<hr>
			<div class="christmas"> 
				<a href="javascript:void(0)" onmousedown="moveable('.santahat');">Santa Hat</a>
				<a href="javascript:void(0)" onmousedown="moveable('.candycane');">Candy Cane</a>
				<a href="javascript:void(0)" onmousedown="moveable('.present');">Christmas Present</a>
				<a href="javascript:void(0)" onmousedown="moveable('.tree');">Christmas Tree</a>
			</div>
			<div class="halloween">
				<a href="javascript:void(0)" onmousedown="moveable('.pumpkin');">Pumpkin</a>
				<a href="javascript:void(0)" onmousedown="moveable('.pumkant');">pumkan't</a>
			</div>
			<a href="javascript:void(0)" onmousedown="moveable('.sysdll');">SYSDLL</a>
		</div>

		<script src="/contextmenu.js"></script>
	</body>
</html>
